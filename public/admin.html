<!DOCTYPE html>
<html lang="en">

<head>
    <title>Admin Dashboard - M.K. Store</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=3">
    <link rel="stylesheet" href="css/admin.css?v=3">
</head>

<body>
    <!-- Premium Background Blobs -->
    <div class="admin-bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="admin-wrapper">
        <!-- Premium Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h1>M.K. STORE</h1>
                <p style="font-size: 0.75rem; color: var(--admin-text-muted); margin-top: 0.5rem;">ADMIN PANEL</p>
            </div>
            <nav class="admin-nav">
                <ul>
                    <li>
                        <a href="#dashboard" class="active">
                            <i class="fa fa-chart-line"></i> <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="#products">
                            <i class="fa fa-box"></i> <span>Products</span>
                        </a>
                    </li>
                    <li>
                        <a href="#orders">
                            <i class="fa fa-shopping-cart"></i> <span>Orders</span>
                        </a>
                    </li>
                    <li>
                        <a href="#users">
                            <i class="fa fa-users"></i> <span>Users</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="logout-item">
                <a href="javascript:void(0)" id="logoutBtn" style="color: #ef4444;">
                    <i class="fa fa-sign-out-alt"></i> <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="admin-content" id="admin-main">
            <div class="welcome-text"></div>
            <div id="dynamic-content">
                <!-- Data loaded via JS -->
                <div class="loading-state"
                    style="display:flex; justify-content:center; align-items:center; height:300px;">
                    <div class="loader"><i class="fa fa-spinner fa-spin fa-2x"></i></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Product</h2>
                <button class="close-btn" onclick="closeProductModal()">&times;</button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <input type="hidden" id="productId" />
                
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" required placeholder="e.g. Wireless Earbuds">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="productPrice">Price ($)</label>
                        <input type="number" id="productPrice" step="0.01" required placeholder="e.g. 49.99">
                    </div>
                    <div class="form-group">
                        <label for="productCategory">Category</label>
                        <select id="productCategory" required>
                            <option value="Groceries">Groceries</option>
                            <option value="Mobiles">Mobiles</option>
                            <option value="Fashion">Fashion</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Home">Home</option>
                            <option value="Appliances">Appliances</option>
                            <option value="Toys">Toys</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="productRating">Rating (1-5)</label>
                        <input type="number" id="productRating" step="0.1" min="1" max="5" required placeholder="e.g. 4.5">
                    </div>
                </div>

                <div class="form-group">
                    <label for="productImage">Image URL or Path</label>
                    <input type="text" id="productImage" required placeholder="e.g. assets/products/new_item.png">
                    <small style="color: var(--admin-text-muted); font-size: 0.75rem; margin-top: 5px; display: block;">Enter an absolute URL or a local path.</small>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeProductModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="saveProductBtn">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js?v=2"></script>
    <script src="js/admin.js?v=2"></script>
</body>

</html>
